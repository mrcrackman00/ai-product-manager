<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Analyses — ProdMind AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🧠</text></svg>" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<div class="app-shell">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/><path d="M19 3v4"/><path d="M21 5h-4"/></svg>
        ProdMind
      </a>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Loading…</div>
          <div class="user-plan" id="user-plan">free</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="history.html" class="nav-item active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><polyline points="12 6 12 12 16 14"/></svg>
        My Analyses
      </a>
      <a href="dashboard.html" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        New Analysis
      </a>
      <a href="#" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="usage-label">
        <span>Analyses used</span>
        <span id="usage-count">0/5</span>
      </div>
      <div class="usage-bar">
        <div class="usage-fill" id="usage-fill" style="width:0%"></div>
      </div>
      <button class="btn btn-primary btn-block btn-sm" id="logout-btn">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log Out
      </button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-greeting">
        <h2>My Analyses</h2>
        <p id="topbar-count">Loading…</p>
      </div>
      <div class="topbar-actions">
        <a href="dashboard.html" class="btn btn-primary btn-sm">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Analysis
        </a>
      </div>
    </header>

    <div class="page-content">
      <!-- Search -->
      <div class="history-topbar">
        <div class="search-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="search-input" placeholder="Search your analyses…" />
        </div>
      </div>

      <!-- Grid -->
      <div class="history-grid" id="history-grid">
        <!-- Skeleton loaders -->
        <div class="card skeleton" style="height:160px"></div>
        <div class="card skeleton" style="height:160px"></div>
        <div class="card skeleton" style="height:160px"></div>
      </div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="empty-state">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z"/></svg>
        <p>No analyses yet. Run your first one!</p>
        <a href="dashboard.html" class="btn btn-primary">Start Analyzing →</a>
      </div>
    </div>
  </main>
</div>

<!-- Expand Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="max-width:700px;max-height:80vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h3 id="modal-title" style="font-size:1.25rem">Analysis</h3>
      <button class="btn btn-ghost btn-sm" id="close-modal">✕</button>
    </div>
    <div class="result-content" id="modal-content"></div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
  import {
    collection, onSnapshot, deleteDoc, doc, getDoc, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

  let allAnalyses = [];

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }

    // Set user info
    const name = user.displayName || 'Founder';
    document.getElementById('user-avatar').textContent = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('user-name').textContent = name;

    // Load usage
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        const d = snap.data();
        const used = d.analysesUsed || 0;
        const limit = d.analysesLimit || 5;
        document.getElementById('user-plan').textContent = d.plan || 'free';
        document.getElementById('usage-count').textContent = `${used}/${limit}`;
        document.getElementById('usage-fill').style.width = `${Math.min((used/limit)*100,100)}%`;
      }
    } catch {}

    // Real-time analyses listener
    const q = query(collection(db, 'users', user.uid, 'analyses'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
      allAnalyses = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderGrid(allAnalyses);
      document.getElementById('topbar-count').textContent = `${allAnalyses.length} total`;
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    });
  });

  function renderGrid(items) {
    const grid = document.getElementById('history-grid');
    const empty = document.getElementById('empty-state');

    if (!items.length) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }

    empty.classList.add('hidden');
    grid.innerHTML = items.map(item => {
      const date = item.createdAt?.toDate?.()?.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) || 'Just now';
      const preview = item.result?.full_text?.slice(0, 120) || 'No preview available.';
      return `
        <div class="card history-card card-hover" data-id="${item.id}" onclick="openDetail('${item.id}')">
          <div class="hc-product">${item.product || 'Untitled'}</div>
          <div class="hc-date">${date}</div>
          <p class="hc-preview">${preview}…</p>
          <div class="hc-meta">
            <div class="hc-badges">
              <span class="pill pill-purple" style="font-size:0.7rem">Analysis</span>
            </div>
            <button class="hc-delete" title="Delete" onclick="deleteItem(event, '${item.id}')">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  window.openDetail = (id) => {
    const item = allAnalyses.find(a => a.id === id);
    if (!item) return;
    document.getElementById('modal-title').textContent = item.product || 'Analysis';
    const text = item.result?.full_text || JSON.stringify(item.result, null, 2);
    document.getElementById('modal-content').innerHTML = text
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n+/g, '</p><p>')
      .replace(/^([^<\n].+)$/gm, '<p>$1</p>');
    document.getElementById('detail-modal').classList.add('open');
  };

  document.getElementById('close-modal').addEventListener('click', () => {
    document.getElementById('detail-modal').classList.remove('open');
  });

  document.getElementById('detail-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });

  window.deleteItem = async (e, id) => {
    e.stopPropagation();
    if (!confirm('Delete this analysis?')) return;
    try {
      const user = auth.currentUser;
      if (!user) return;
      await deleteDoc(doc(db, 'users', user.uid, 'analyses', id));
      showToast('Analysis deleted', 'success');
    } catch { showToast('Delete failed', 'error'); }
  };

  // Search filter
  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    renderGrid(allAnalyses.filter(a => (a.product || '').toLowerCase().includes(q)));
  });

  function showToast(msg, type = 'info') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    c.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
  }
</script>
</body>
</html>
